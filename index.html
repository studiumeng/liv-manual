<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LIV — Manual digital</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#D6C8B6;
    --card:#EBEAE7;
    --ink:#2C3740;
    --muted:#373737;
    --gold:#2C3740;
    --border:rgba(44,55,64,0.16);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    font-family: Arial, "Helvetica Neue", sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:48px 20px;
  }
  .page{ width:100%; max-width:400px; text-align:center; padding-top:8px; }
  .mark{ display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:28px; }
  .mark-lines{ width:34px; height:32px; overflow:visible; }
  .mark-lines line{ stroke:var(--ink); stroke-width:1.4; }
  h1{ font-family:'Jost', Arial, sans-serif; font-size:30px; letter-spacing:7px; font-weight:300; margin:0; }
  .apto{ font-size:12px; letter-spacing:1.5px; color:var(--muted); margin:0 0 36px; text-transform:uppercase; }
  .cards{ display:flex; flex-direction:column; gap:12px; text-align:left; }
  a.card{
    display:block; background:var(--card); border:1px solid var(--border);
    border-radius:4px; padding:16px 18px; text-decoration:none; color:var(--ink);
  }
  a.card .t{ font-size:15px; font-weight:500; margin-bottom:4px; }
  a.card .s{ font-size:12px; color:var(--muted); }
  .footer-logo{ margin-top:40px; max-width:120px; height:auto; opacity:0.85; }
  .msg{ font-size:14px; color:var(--muted); margin-top:24px; }
</style>
</head>
<body>
<div class="page">
  <div class="mark">
    <svg viewBox="0 0 90 84" class="mark-lines" aria-hidden="true">
      <line x1="6"  y1="33" x2="6"  y2="76" />
      <line x1="14" y1="27" x2="14" y2="76" />
      <line x1="17" y1="11" x2="17" y2="82" />
      <line x1="20" y1="3"  x2="20" y2="82" />
      <line x1="26" y1="11" x2="26" y2="70" />
      <line x1="36" y1="18" x2="36" y2="70" />
    </svg>
    <h1>LIV</h1>
  </div>
  <p class="apto" id="apto-label">carregando...</p>
  <div class="cards" id="cards"></div>
  <img src="logo-dabol.png" alt="Dabol Engenharia" class="footer-logo">
</div>

<script>
  // ======================================================================
  // CONFIGURAÇÃO — edite aqui sempre que precisar atualizar um link.
  // Depois de editar, é só subir esse mesmo arquivo de novo no GitHub Pages
  // (substitui o index.html) — o link do QR continua o mesmo.
  //
  // Cole os links de compartilhamento do OneDrive de cada apartamento.
  // Se preferir, pode ser um link único para a subpasta do apto (o cliente
  // vê os 3 arquivos dentro dela) em vez de 3 links separados — nesse caso
  // repita o mesmo link nos 3 campos.
  // ======================================================================
  const APTOS = {
    "101": {
      manual:               "COLE_AQUI_O_LINK_ONEDRIVE_MANUAL_101",
      pmp:                  "COLE_AQUI_O_LINK_ONEDRIVE_PMP_101",
      memorial:             "COLE_AQUI_O_LINK_ONEDRIVE_MEMORIAL_101",
      caderno_projetos:     "COLE_AQUI_O_LINK_ONEDRIVE_CADERNO_101",
      documentos_projetos:  "COLE_AQUI_O_LINK_ONEDRIVE_DOCUMENTOS_101"
    },
    "102": {
      manual:               "COLE_AQUI_O_LINK_ONEDRIVE_MANUAL_102",
      pmp:                  "COLE_AQUI_O_LINK_ONEDRIVE_PMP_102",
      memorial:             "COLE_AQUI_O_LINK_ONEDRIVE_MEMORIAL_102",
      caderno_projetos:     "COLE_AQUI_O_LINK_ONEDRIVE_CADERNO_102",
      documentos_projetos:  "COLE_AQUI_O_LINK_ONEDRIVE_DOCUMENTOS_102"
    }
    // adicione as demais 30 unidades seguindo o mesmo padrão...
  };

  const CARD_DEFS = [
    { key: "manual",              t: "Manual de Uso, Operação e Manutenção" },
    { key: "pmp",                 t: "Plano de Manutenção Preventiva - PMP" },
    { key: "memorial",            t: "Memorial de Acabamentos" },
    { key: "caderno_projetos",    t: "Caderno de Projetos" },
    { key: "documentos_projetos", t: "Documentos e Projetos" }
  ];
  // ======================================================================

  // Transforma o link normal do OneDrive num link que abre só o documento,
  // sem a interface do OneDrive por volta.
  function toCleanViewUrl(url){
    if(!url) return url;
    if(url.indexOf("action=embedview") !== -1) return url;
    const sep = url.indexOf("?") === -1 ? "?" : "&";
    return url + sep + "action=embedview";
  }

  function init(){
    const params = new URLSearchParams(window.location.search);
    const apto = params.get("apto");
    const label = document.getElementById("apto-label");
    const cardsEl = document.getElementById("cards");

    if(!apto){
      label.textContent = "apartamento não informado";
      cardsEl.innerHTML = '<p class="msg">Acesse pelo QR code do seu apartamento.</p>';
      return;
    }

    label.textContent = "apartamento " + apto;
    const row = APTOS[String(apto)];

    if(!row){
      cardsEl.innerHTML = '<p class="msg">Não encontramos os documentos deste apartamento. Fale com o suporte.</p>';
      return;
    }

    cardsEl.innerHTML = "";
    CARD_DEFS.forEach(def => {
      const url = row[def.key];
      if(!url || url.indexOf("COLE_AQUI") === 0) return;
      const a = document.createElement("a");
      a.className = "card";
      a.href = toCleanViewUrl(url);
      a.target = "_blank";
      a.rel = "noopener";
      a.innerHTML = '<div class="t">' + def.t + '</div><div class="s">abrir documento →</div>';
      cardsEl.appendChild(a);
    });

    if(!cardsEl.children.length){
      cardsEl.innerHTML = '<p class="msg">Documentos deste apartamento ainda não configurados.</p>';
    }
  }

  init();
</script>
</body>
</html>
